<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <!-- KidTasker Logo -->
  <!-- Mascot: Blue checkmark character with smile -->
  <g transform="translate(10, 8)">
    <!-- Body/shield shape -->
    <path d="M32 5 L52 20 L48 55 L32 65 L16 55 L12 20 Z" fill="#4A8CF7" rx="5"/>
    <!-- Checkmark -->
    <polyline points="20,35 29,44 46,22" stroke="white" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Face -->
    <circle cx="25" cy="28" r="2" fill="white"/>
    <circle cx="40" cy="22" r="2" fill="white"/>
    <!-- Smile -->
    <path d="M24,38 Q32,48 44,32" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Red cap -->
    <ellipse cx="32" cy="8" rx="20" ry="8" fill="#E74C3C"/>
    <rect x="12" y="5" width="40" height="6" rx="3" fill="#E74C3C"/>
    <rect x="28" y="0" width="12" height="4" rx="2" fill="#C0392B"/>
  </g>

  <!-- "Kid" text -->
  <text x="72" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="42" fill="#2C3E50">Kid</text>
  <!-- "Tasker" text -->
  <text x="137" y="52" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="42" fill="#4A8CF7">Tasker</text>
  <!-- Star -->
  <polygon points="280,18 283,27 293,27 285,33 288,42 280,36 272,42 275,33 267,27 277,27" fill="#F39C12"/>
  <!-- Underline swoosh -->
  <path d="M72,60 Q180,68 290,58" stroke="#F39C12" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
