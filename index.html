<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kid Tasker</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <!-- jsPDF for worksheet generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Tesseract.js for OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- Chart.js for analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QR Code generator for Form IDs -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <!-- jsQR for reading QR codes from scanned images -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
  <div id="app">
    <nav id="navbar" class="navbar hidden">
      <div class="nav-brand">
        <img src="img/favicon.svg" alt="Kid Tasker" class="nav-logo-img"> Kid Tasker
      </div>
      <div class="nav-links">
        <a href="#/dashboard" class="nav-link" data-route="dashboard">Dashboard</a>
        <a href="#/submit" class="nav-link" data-route="submit">Submit</a>
        <a href="#/analytics" class="nav-link" data-route="analytics">Analytics</a>
        <a href="#/settings" class="nav-link" data-route="settings">Settings</a>
        <a href="help.html" target="_blank" class="nav-link">Help</a>
      </div>
      <div class="nav-user">
        <span id="nav-username"></span>
        <button id="btn-logout" class="btn btn-sm btn-outline">Sign Out</button>
      </div>
    </nav>
    <main id="main-content"></main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/image-store.js"></script>
  <script src="js/pdf-generator.js"></script>
  <script src="js/ocr-processor.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
